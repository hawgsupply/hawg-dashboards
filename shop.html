<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hawg Supply — Shop Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --cyan: #00D4FF;
    --green: #00FF88;
    --purple: #AA44FF;
    --red: #FF3355;
    --bg: #080C10;
    --bg2: #0D1117;
    --bg3: #141B24;
    --border: #1E2A38;
    --border2: #253347;
    --text: #C8D8E8;
    --muted: #4A6080;
    --mono: 'Share Tech Mono', monospace;
    --head: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--head);
    font-size: 15px;
    min-height: 100vh;
    background-image:
      linear-gradient(rgba(0,212,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .shell {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), transparent);
  }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand-name {
    font-family: var(--head);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 4px;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }
  .brand-name span { color: var(--orange); }
  .brand-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-right { text-align: right; }
  .date-display {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .header-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }

  /* ── BUTTONS ── */
  .btn {
    font-family: var(--head);
    font-weight: 600;
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--orange);
    color: #000;
    box-shadow: 0 0 12px rgba(255,107,0,0.3);
  }
  .btn-primary:hover { background: #FF8C33; box-shadow: 0 0 20px rgba(255,107,0,0.5); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.s-done::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .stat-card.s-prog::before { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .stat-card.s-ord::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .stat-card.s-ns::before { background: var(--muted); }
  .stat-num {
    font-family: var(--mono);
    font-size: 36px;
    line-height: 1;
    font-weight: 400;
  }
  .s-done .stat-num { color: var(--green); text-shadow: 0 0 12px rgba(0,255,136,0.4); }
  .s-prog .stat-num { color: var(--orange); text-shadow: 0 0 12px rgba(255,107,0,0.4); }
  .s-ord .stat-num { color: var(--cyan); text-shadow: 0 0 12px rgba(0,212,255,0.4); }
  .s-ns .stat-num { color: var(--muted); }
  .stat-lbl {
    font-family: var(--head);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    display: flex;
    overflow: hidden;
  }
  .pseg { height: 4px; transition: width 0.5s ease; }
  .pseg-done { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .pseg-prog { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .pseg-ord { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .pseg-ns { background: var(--border2); }

  /* ── SECTION ── */
  .section { margin-bottom: 32px; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .section-head::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 60px; height: 1px;
    background: var(--orange);
    box-shadow: 0 0 6px var(--orange);
  }
  .section-label {
    font-family: var(--head);
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sec-count {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--orange);
    padding: 2px 8px;
    border-radius: 2px;
  }

  /* ── TASK CARD ── */
  .task-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 2px;
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .task-card:hover { border-color: var(--border2); }
  .task-card.done {
    opacity: 0.35;
    border-left-color: var(--green);
  }
  .task-card.in-progress {
    border-left-color: var(--orange);
    box-shadow: -2px 0 8px rgba(255,107,0,0.15);
  }
  .task-card.ordered {
    border-left-color: var(--cyan);
    box-shadow: -2px 0 8px rgba(0,212,255,0.15);
  }
  .task-card.not-started { border-left-color: var(--border2); }

  .task-left { flex: 1; }
  .task-title {
    font-family: var(--head);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .task-card.done .task-title { text-decoration: line-through; color: var(--muted); }

  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .day-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .day-Mon { background: rgba(106,163,255,0.12); color: #6AA3FF; border: 1px solid rgba(106,163,255,0.25); }
  .day-Tue { background: rgba(176,106,255,0.12); color: #B06AFF; border: 1px solid rgba(176,106,255,0.25); }
  .day-Wed { background: rgba(255,106,106,0.12); color: #FF6A6A; border: 1px solid rgba(255,106,106,0.25); }
  .day-Thu { background: rgba(106,255,170,0.12); color: #6AFFAA; border: 1px solid rgba(106,255,170,0.25); }
  .day-Fri { background: rgba(255,204,68,0.12); color: #FFCC44; border: 1px solid rgba(255,204,68,0.25); }
  .day-Sat { background: rgba(68,255,238,0.12); color: #44FFEE; border: 1px solid rgba(68,255,238,0.25); }
  .day-Sun { background: rgba(255,170,68,0.12); color: #FFAA44; border: 1px solid rgba(255,170,68,0.25); }

  .task-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .task-actions { display: flex; gap: 4px; align-items: center; }
  .day-select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 2px;
    cursor: pointer;
  }
  .day-select:focus { outline: none; border-color: var(--orange); color: var(--text); }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    padding: 3px 7px;
    border-radius: 2px;
    color: var(--muted);
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .icon-btn.delete:hover { border-color: var(--red); color: var(--red); }

  .status-group { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
  .status-btn {
    font-family: var(--head);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-btn:hover { border-color: var(--border2); color: var(--text); }
  .status-btn.active-not-started { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .status-btn.active-in-progress { border-color: var(--orange); color: var(--orange); background: rgba(255,107,0,0.1); box-shadow: 0 0 6px rgba(255,107,0,0.2); }
  .status-btn.active-ordered { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.1); box-shadow: 0 0 6px rgba(0,212,255,0.2); }
  .status-btn.active-done { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.1); box-shadow: 0 0 6px rgba(0,255,136,0.2); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-top: 2px solid var(--orange);
    border-radius: 4px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 0 40px rgba(255,107,0,0.15);
  }
  .modal h2 {
    font-family: var(--head);
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--orange);
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 2px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: var(--head);
    resize: vertical;
    transition: border-color 0.15s;
  }
  .form-group textarea { min-height: 80px; }
  .form-group select { height: 38px; }
  .form-group textarea:focus,
  .form-group select:focus { outline: none; border-color: var(--orange); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── WHOLESALE CARDS ── */
  .wo-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--orange);
    border-radius: 2px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .wo-card.status-shipped { border-left-color: var(--cyan); }
  .wo-card.status-invoiced { border-left-color: var(--purple); }
  .wo-card.status-done { border-left-color: var(--green); opacity: 0.5; }

  .wo-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .wo-po {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--orange);
    letter-spacing: 2px;
  }
  .wo-card.status-shipped .wo-po { color: var(--cyan); }
  .wo-card.status-invoiced .wo-po { color: var(--purple); }
  .wo-card.status-done .wo-po { color: var(--green); }

  .wo-date { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 10px; }
  .wo-ship-by { font-family: var(--mono); font-size: 11px; }
  .wo-ship-by strong { color: #fff; }

  .wo-meta { display: flex; gap: 20px; font-size: 12px; color: var(--muted); flex-wrap: wrap; margin-bottom: 12px; font-family: var(--head); }

  .wo-status-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .wo-sbtn {
    font-family: var(--head);
    font-weight: 600;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .wo-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .wo-table thead tr { border-bottom: 1px solid var(--border2); }
  .wo-table th { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 5px 8px; font-weight: 400; }
  .wo-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .wo-table td.sku { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .wo-table td.desc { color: var(--text); }
  .wo-table td.num { text-align: right; font-family: var(--mono); font-size: 11px; }
  .wo-table td.price { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--orange); }
  .wo-total { text-align: right; padding: 8px 8px 0; font-family: var(--mono); font-size: 14px; color: var(--green); border-top: 1px solid var(--border2); margin-top: 4px; }
  .wo-total-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-right: 12px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .task-card { flex-direction: column; }
    .task-right { align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-name">HAWG <span>SUPPLY</span></div>
      <div class="brand-sub">// SHOP OPERATIONS CENTER</div>
    </div>
    <div class="header-right">
      <div class="date-display" id="dateDisplay"></div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="exportData()">↓ EXPORT</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">↑ IMPORT</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card s-done">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-lbl">Completed</div>
    </div>
    <div class="stat-card s-prog">
      <div class="stat-num" id="stat-prog">0</div>
      <div class="stat-lbl">In Progress</div>
    </div>
    <div class="stat-card s-ord">
      <div class="stat-num" id="stat-ord">0</div>
      <div class="stat-lbl">Ordered</div>
    </div>
    <div class="stat-card s-ns">
      <div class="stat-num" id="stat-ns">0</div>
      <div class="stat-lbl">Not Started</div>
    </div>
  </div>
  <div class="progress-wrap" id="progressBar"></div>

  <!-- MACHINING -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">⚙ Machining Tasks <span class="sec-count" id="machining-count">0</span></div>
      <button class="btn btn-primary" onclick="openAddModal('machining')">+ ADD TASK</button>
    </div>
    <div id="machining-tasks"></div>
  </div>

  <!-- BIKE / FAB -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">🔧 Bike &amp; Fabrication <span class="sec-count" id="bike-count">0</span></div>
      <button class="btn btn-primary" onclick="openAddModal('bike')">+ ADD TASK</button>
    </div>
    <div id="bike-tasks"></div>
  </div>

  <!-- DESIGN -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">◈ Design Tasks <span class="sec-count" id="design-count">0</span></div>
      <button class="btn btn-primary" onclick="openAddModal('design')">+ ADD TASK</button>
    </div>
    <div id="design-tasks"></div>
  </div>

  <!-- MATERIALS -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">◈ Materials &amp; Inventory <span class="sec-count" id="materials-count">0</span></div>
      <button class="btn btn-primary" onclick="openMaterialModal()">+ ADD ITEM</button>
    </div>
    <div id="materials-list"></div>
  </div>

  <!-- WHOLESALE ORDERS -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">▣ Wholesale Orders <span class="sec-count" id="wholesale-count">0</span></div>
    </div>
    <div id="wholesale-orders-list"></div>
  </div>

</div>

<!-- MATERIAL MODAL -->
<div class="modal-overlay" id="matModalOverlay">
  <div class="modal">
    <h2>Add Material / Inventory</h2>
    <div class="form-group">
      <label>Item Name</label>
      <textarea id="matName" placeholder="e.g. 304SS Shifter Shafts" style="min-height:50px"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Quantity</label>
        <textarea id="matQty" placeholder="e.g. 60 pcs" style="min-height:38px;resize:none"></textarea>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="matStatus">
          <option>Ordered</option><option>Shipped</option><option>In Stock</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Supplier</label>
      <textarea id="matSupplier" placeholder="e.g. China CNC, McMaster-Carr" style="min-height:38px;resize:none"></textarea>
    </div>
    <div class="form-group">
      <label>Cost</label>
      <textarea id="matCost" placeholder="e.g. $1,275 shipped" style="min-height:38px;resize:none"></textarea>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="matNotes" placeholder="Any additional notes..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeMaterialModal()">CANCEL</button>
      <button class="btn btn-primary" onclick="saveMaterial()">SAVE</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Task</h2>
    <div class="form-group">
      <label>Task Description</label>
      <textarea id="modalTaskTitle" placeholder="Describe the task..."></textarea>
    </div>
    <div class="form-group">
      <label>Day</label>
      <select id="modalDay">
        <option>Mon</option><option>Tue</option><option>Wed</option>
        <option>Thu</option><option>Fri</option><option>Sat</option><option>Sun</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="modalStatus">
        <option>Not Started</option><option>In Progress</option>
        <option>Ordered</option><option>Done</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-primary" onclick="saveModal()">SAVE</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const STATUSES = ['Not Started','In Progress','Ordered','Done'];
const SECTIONS = { machining: 'machining', bike: 'bike', design: 'design' };

// ── Wholesale Orders ──────────────────────────────────────────────────────────
const wholesaleOrders = [
  {
    po: "57994",
    date: "2026-03-18",
    ship_by: "2026-03-25",
    customer: "Lowbrow Customs",
    contact: "Katy Medvetz",
    email: "katy@lowbrowcustoms.com",

function statusKey(s) { return s.toLowerCase().replace(/\s+/g, '-'); }
function genId() { return 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2,5); }

function findTask(id) {
  for (const section of Object.keys(tasks)) {
    const idx = tasks[section].findIndex(t => t.id === id);
    if (idx > -1) return { task: tasks[section][idx], section, idx };
  }
}

function changeStatus(id, status) {
  const { task } = findTask(id);
  task.status = status;
  saveState();
  renderAll();
}

function changeDay(id, day) {
  const { task } = findTask(id);
  task.day = day;
  saveState();
  renderAll();
}

function deleteTask(id) {
  const { section, idx } = findTask(id);
  if (confirm('Delete this task?')) {
    tasks[section].splice(idx, 1);
    saveState();
    renderAll();
  }
}

let modalMode = 'add';
let modalSection = '';
let modalEditId = '';

function openAddModal(section) {
  modalMode = 'add';
  modalSection = section;
  document.getElementById('modalTitle').textContent = 'Add Task';
  document.getElementById('modalTaskTitle').value = '';
  document.getElementById('modalDay').value = 'Mon';
  document.getElementById('modalStatus').value = 'Not Started';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  const { task, section } = findTask(id);
  modalMode = 'edit';
  modalSection = section;
  modalEditId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('modalTaskTitle').value = task.title;
  document.getElementById('modalDay').value = task.day;
  document.getElementById('modalStatus').value = task.status;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveModal() {
  const title = document.getElementById('modalTaskTitle').value.trim();
  if (!title) return;
  const day = document.getElementById('modalDay').value;
  const status = document.getElementById('modalStatus').value;
  if (modalMode === 'add') {
    tasks[modalSection].push({ id: genId(), title, day, status });
  } else {
    const { task } = findTask(modalEditId);
    task.title = title; task.day = day; task.status = status;
  }
  saveState();
  closeModal();
  renderAll();
}

function exportData() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shop-tasks-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try { tasks = JSON.parse(e.target.result); saveState(); renderAll(); }
    catch(err) { alert('Invalid file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function renderTask(task) {
  const sk = statusKey(task.status);
  const card = document.createElement('div');
  card.className = `task-card ${sk}`;
  card.innerHTML = `
    <div class="task-left">
      <div class="task-title">${task.title}</div>
      <div class="task-meta">
        <span class="day-badge day-${task.day}">${task.day}</span>
      </div>
    </div>
    <div class="task-right">
      <div class="task-actions">
        <select class="day-select" onchange="changeDay('${task.id}', this.value)">
          ${DAYS.map(d => `<option value="${d}" ${d === task.day ? 'selected' : ''}>${d}</option>`).join('')}
        </select>
        <button class="icon-btn" title="Edit" onclick="openEditModal('${task.id}')">✏</button>
        <button class="icon-btn delete" title="Delete" onclick="deleteTask('${task.id}')">✕</button>
      </div>
      <div class="status-group">
        ${STATUSES.map(s => `<button class="status-btn ${statusKey(s) === sk ? 'active-' + statusKey(s) : ''}" onclick="changeStatus('${task.id}', '${s}')">${s}</button>`).join('')}
      </div>
    </div>
  `;
  return card;
}

  const total = all.length || 1;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-prog').textContent = prog;
  document.getElementById('stat-ord').textContent = ord;
  document.getElementById('stat-ns').textContent = ns;

    <div class="pseg pseg-done" style="width:${done/total*100}%"></div>

async function sbFetch(method, table, data, query='') {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}${query}`, {
      method,
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : 'return=representation'
      },
      body: data ? JSON.stringify(data) : undefined
    });
    if (!res.ok) return null;
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch { return null; }
}

async function syncTasksToSB() {
  const all = [...tasks.machining, ...tasks.bike, ...tasks.design].map(t => ({...t, section: Object.keys(tasks).find(s => tasks[s].find(x => x.id === t.id))}));
  await sbFetch('POST', 'tasks', all);
}

async function deleteTaskFromSB(id) { await sbFetch('DELETE', 'tasks', null, `?id=eq.${id}`); }

async function syncMatsToSB() {
  const list = loadMaterials();
  if (list.length) await sbFetch('POST', 'inventory', list);
}

async function loadFromSB() {
  try {
    const [sbTasks, sbInv] = await Promise.all([
      sbFetch('GET', 'tasks', null, '?order=created_at.asc'),
      sbFetch('GET', 'inventory', null, '?order=created_at.asc')
    ]);
    // Only update if Supabase actually returned data — never wipe with empty
    if (sbTasks && sbTasks.length > 0) {
      const sections = { machining: [], bike: [], design: [] };
      sbTasks.forEach(t => { if (sections[t.section]) sections[t.section].push(t); });
      if (Object.values(sections).some(s => s.length)) {
        tasks = sections;
        localStorage.setItem('shopDashboard2', JSON.stringify(tasks));
      }
    }
    if (sbInv && sbInv.length > 0) {
      localStorage.setItem(MAT_KEY, JSON.stringify(sbInv));
    }
  } catch(e) {
    console.warn('Supabase load failed, using localStorage:', e);
  }
}
